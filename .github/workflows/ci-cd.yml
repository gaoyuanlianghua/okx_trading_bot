name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test_and_build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pyinstaller

    - name: Run tests
      run: |
        # Debug: Check current directory and list files
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        
        # Run pytest with auto-discovery (finds all test files)
        $testOutput = pytest -v --tb=short 2>&1
        $testExitCode = $LASTEXITCODE
        Write-Host $testOutput
        Write-Host "Pytest exit code: $testExitCode"
        
        # Check if tests passed by looking for "passed" in the output
        if ($testOutput -match "passed") {
          Write-Host "Tests passed, proceeding with build"
          exit 0
        } else {
          Write-Host "Tests failed, exiting with code $testExitCode"
          exit $testExitCode
        }

    - name: Build application
      run: |
        Write-Host "Building application..."
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        Write-Host "Installed packages:"
        pip list
        Write-Host "Running PyInstaller..."
        pyinstaller okx_trading_bot.spec --onefile --clean --noconfirm -v
        $buildExitCode = $LASTEXITCODE
        Write-Host "PyInstaller exit code: $buildExitCode"
        
        if ($buildExitCode -ne 0) {
          Write-Host "Build failed with exit code: $buildExitCode"
          Write-Host "Build directory contents:"
          Get-ChildItem -Path build -Recurse -ErrorAction SilentlyContinue
          Write-Host "Dist directory contents:"
          Get-ChildItem -Path dist -Recurse -ErrorAction SilentlyContinue
          exit $buildExitCode
        }
        Write-Host "Build completed successfully"
        Write-Host "Dist directory contents:"
        Get-ChildItem -Path dist -Recurse

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: okx_trading_bot
        path: dist/

  release:
    needs: test_and_build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: okx_trading_bot
        path: dist

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/okx_trading_bot.exe
        asset_name: okx_trading_bot.exe
        asset_content_type: application/octet-stream

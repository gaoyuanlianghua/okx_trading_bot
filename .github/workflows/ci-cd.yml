name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test_and_build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pyinstaller

    - name: Run tests
      run: |
        # Debug: Check current directory and list files
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        
        # Run pytest and capture output
        pytest -v --tb=short 2>&1 | Tee-Object -Variable pytestOutput
        
        # Check if "passed" appears in output (indicating success)
        if ($pytestOutput -match "passed") {
          Write-Host "Tests passed, proceeding with build"
        } else {
          Write-Host "Tests failed"
          exit 1
        }

    - name: Build application
      run: |
        Write-Host "Building application..."
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        
        # Verify spec file exists
        if (!(Test-Path "okx_trading_bot.spec")) {
          Write-Host "ERROR: okx_trading_bot.spec file not found!"
          exit 1
        }
        
        Write-Host "Spec file content:"
        Get-Content "okx_trading_bot.spec"
        
        Write-Host "Installed packages:"
        pip list
        
        Write-Host "Running PyInstaller..."
        # Run PyInstaller with output visible and captured
        pyinstaller okx_trading_bot.spec --clean --noconfirm -v 2>&1 | Out-File -FilePath build_output.log -Encoding UTF8
        $buildExitCode = $LASTEXITCODE
        Write-Host "PyInstaller exit code: $buildExitCode"
        
        # Show the build output for debugging
        Write-Host "Build output:"
        Get-Content build_output.log
        
        # Check dist directory exists BEFORE checking exit code
        if (!(Test-Path "dist")) {
          Write-Host "ERROR: Dist directory was not created by PyInstaller!"
          Write-Host "Build output:"
          Get-Content build_output.log
          if (Test-Path "build") {
            Write-Host "Build folder contents:"
            Get-ChildItem -Path build -Recurse
          }
          exit 1
        }
        
        if ($buildExitCode -ne 0) {
          Write-Host "Build completed with warnings/errors (exit code: $buildExitCode)"
          Write-Host "But dist directory exists, continuing..."
        }
        
        Write-Host "Build completed successfully"
        Get-ChildItem -Path dist -Recurse

    - name: Verify artifact exists before upload
      run: |
        if (!(Test-Path "dist/okx_trading_bot.exe")) {
          Write-Host "ERROR: okx_trading_bot.exe not found in dist directory!"
          Get-ChildItem -Path dist -Recurse
          exit 1
        }
        Write-Host "Artifact verified successfully"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: okx_trading_bot
        path: dist/

  release:
    needs: test_and_build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: okx_trading_bot
        path: dist

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/okx_trading_bot.exe
        asset_name: okx_trading_bot.exe
        asset_content_type: application/octet-stream

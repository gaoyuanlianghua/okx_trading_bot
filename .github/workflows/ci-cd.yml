name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test_and_build:
    runs-on: windows-latest
    permissions:
      contents: write
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pyinstaller

    - name: Run tests
      run: |
        # Debug: Check current directory and list files
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        
        # Run pytest with auto-discovery (finds all test files)
        pytest -v --tb=short
        $testExitCode = $LASTEXITCODE
        
        if ($testExitCode -ne 0) {
          Write-Host "Tests failed with exit code: $testExitCode"
          exit $testExitCode
        }
        Write-Host "Tests passed, proceeding with build"

    - name: Build application
      run: |
        Write-Host "Building application..."
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        Write-Host "Installed packages:"
        pip list
        
        Write-Host "Running PyInstaller..."
        pyinstaller okx_trading_bot.spec --onefile --clean --noconfirm -v 2>&1 | Tee-Object -Variable output
        $buildExitCode = $LASTEXITCODE
        Write-Host "PyInstaller output:"
        Write-Host $output
        Write-Host "PyInstaller exit code: $buildExitCode"
        
        if (!(Test-Path "dist")) {
          Write-Host "ERROR: Dist directory was not created by PyInstaller!"
          if (Test-Path "build") {
            Get-ChildItem -Path build -Recurse
          }
          exit 1
        }
        
        if ($buildExitCode -ne 0) {
          Write-Host "Build failed with exit code: $buildExitCode"
          exit $buildExitCode
        }
        Write-Host "Build completed successfully"
        Get-ChildItem -Path dist -Recurse

    - name: Verify artifact exists before upload
      run: |
        if (!(Test-Path "dist/okx_trading_bot.exe")) {
          Write-Host "ERROR: okx_trading_bot.exe not found in dist directory!"
          Get-ChildItem -Path dist -Recurse
          exit 1
        }
        Write-Host "Artifact verified successfully"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: okx_trading_bot
        path: dist/

  release:
    needs: test_and_build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: okx_trading_bot
        path: dist

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/okx_trading_bot.exe
        asset_name: okx_trading_bot.exe
        asset_content_type: application/octet-stream

name: CI/CD Pipeline

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  test_and_build:
    runs-on: windows-latest
    env:
      PYTHONIOENCODING: utf-8
    permissions:
      contents: write
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.8'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pyinstaller pytest-timeout
        
        # Verify critical packages are installed
        python -c "import PyQt5; import requests; import websockets; import numpy; import pandas; print('All critical packages installed')"

    - name: Verify imports
      run: |
        python -c "
        import sys
        import os
        
        # Force UTF-8 encoding on Windows
        if sys.platform == 'win32':
            os.environ['PYTHONIOENCODING'] = 'utf-8'
        
        modules_to_check = [
            'core.agents.market_data_agent',
            'core.agents.order_agent',
            'strategies.base_strategy'
        ]
        
        failed = []
        for module in modules_to_check:
            try:
                __import__(module)
                print(f'[OK] {module}')
            except Exception as e:
                print(f'[FAIL] {module}: {e}')
                failed.append(module)
        
        if failed:
            print(f'\nFailed to import: {failed}')
            sys.exit(1)
        "

    - name: Run tests
      run: |
        # Debug: Check current directory and list files
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem
        
        # Set environment variables to disable real API calls
        $env:OKX_TEST_MODE = "true"
        $env:DISABLE_WEBSOCKET = "true"
        
        # Run pytest with timeout
        pytest -v --tb=short --timeout=30 2>&1 | Tee-Object -FilePath test_output.log
        $testExitCode = $LASTEXITCODE
        
        Write-Host "Test exit code: $testExitCode"
        Get-Content test_output.log
        
        # Ignore exit code -1073741819 and -1073740791 (Access Violation on Windows) if tests passed
        # This is a known issue with pytest cleanup on Windows with certain packages
        if ($testExitCode -eq -1073741819 -or $testExitCode -eq -1073740791) {
          Write-Host "Warning: Pytest crashed with access violation during cleanup"
          Write-Host "This is a known Windows issue. Checking if tests actually passed..."
          
          $testOutput = Get-Content test_output.log | Out-String
          # Updated: More reliable pattern matching
          if ($testOutput -match "(\d+) passed" -or ($testOutput -match "passed" -and $testOutput -notmatch "FAILED")) {
            Write-Host "Tests passed despite cleanup crash. Continuing..."
            exit 0
          }
        }
        
        # Exit with the actual pytest exit code for other errors
        if ($testExitCode -ne 0) {
          Write-Host "Tests failed with exit code: $testExitCode"
          exit $testExitCode
        }
        
        Write-Host "Tests passed, proceeding with build"

    - name: Build application
      run: |
        Write-Host "Building application..."
        Write-Host "Current directory: $pwd"
        Write-Host "Files in current directory:"
        Get-ChildItem -Force
        
        # List Python path to verify module discovery
        python -c "import sys; print('Python path:'); [print(p) for p in sys.path]"
        
        # Verify main_new.py exists
        if (!(Test-Path "main_new.py")) {
          Write-Host "ERROR: main_new.py file not found!"
          exit 1
        }
        
        # Verify spec file exists
        if (!(Test-Path "okx_trading_bot.spec")) {
          Write-Host "ERROR: okx_trading_bot.spec file not found!"
          exit 1
        }
        
        Write-Host "Spec file content:"
        Get-Content "okx_trading_bot.spec"
        
        Write-Host "Installed packages:"
        pip list
        
        Write-Host "Running PyInstaller..."
        # Run PyInstaller and capture full output
        pyinstaller okx_trading_bot.spec --clean --noconfirm 2>&1 | Tee-Object -FilePath build_output.log
        $buildExitCode = $LASTEXITCODE
        
        Write-Host "PyInstaller exit code: $buildExitCode"
        Write-Host "=== Full Build Output ==="
        Get-Content build_output.log
        Write-Host "=========================="
        
        # Check build result
        if (!(Test-Path "dist")) {
          Write-Host "ERROR: Dist directory was not created!"
          Write-Host "This usually means PyInstaller encountered an error during bundling."
          Write-Host "Check the output above for import errors or missing dependencies."
          exit 1
        }
        
        Write-Host "Build completed successfully"

    - name: Verify artifact exists before upload
      run: |
        if (!(Test-Path "dist/okx_trading_bot.exe")) {
          Write-Host "ERROR: okx_trading_bot.exe not found in dist directory!"
          Get-ChildItem -Path dist -Recurse
          exit 1
        }
        Write-Host "Artifact verified successfully"

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: okx_trading_bot
        path: dist/

  release:
    needs: test_and_build
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: okx_trading_bot
        path: dist

    - name: Create Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ github.run_number }}
        release_name: Release v${{ github.run_number }}
        draft: false
        prerelease: false

    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/okx_trading_bot.exe
        asset_name: okx_trading_bot.exe
        asset_content_type: application/octet-stream
